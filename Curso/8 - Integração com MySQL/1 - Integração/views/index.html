<h1>Cadastre um livro</h1>
<form action="/books/insert" method="POST" class="form">
    <div class="form-control">
        <label for="title">Título:</label>
        <input type="text" name="title" placeholder="Digite o título" />
    </div>
    <div class="form-control">
        <label for="pagesqty">Quantidade de páginas:</label>
        <input type="text" name="pageqty" placeholder="Informe o totla de páginas" />
    </div>
    <input type="submit" value="Cadastrar">
</form>
