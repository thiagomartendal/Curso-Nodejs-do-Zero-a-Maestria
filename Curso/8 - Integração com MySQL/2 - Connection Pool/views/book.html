<div id="book-page">
    <a href="/books">Voltar</a>
    <div class="container">
        <h1>{{book.title}}</h1>
        <p>Total de páginas: {{book.pageqty}}</p>
        <div class="actions">
            <form action="/books/remove/{{book.id}}" method="post">
                <a href="/books/edit/{{book.id}}">Editar</a>
                <input type="submit" value="Excluir" />
            </form>
        </div>
    </div>
</div>
