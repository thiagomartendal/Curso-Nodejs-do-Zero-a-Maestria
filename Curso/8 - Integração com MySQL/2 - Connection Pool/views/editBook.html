<h1>Edite o livro</h1>
<form action="/books/updatebook" method="POST" class="form">
    <input type="hidden" name="id" value="{{book.id}}" />
    <div class="form-control">
        <label for="title">Título:</label>
        <input type="text" name="title" value="{{book.title}}" placeholder="Digite o título" />
    </div>
    <div class="form-control">
        <label for="pagesqty">Quantidade de páginas:</label>
        <input type="text" name="pageqty" value="{{book.pageqty}}" placeholder="Informe o totla de páginas" />
    </div>
    <input type="submit" value="Editar">
</form>
