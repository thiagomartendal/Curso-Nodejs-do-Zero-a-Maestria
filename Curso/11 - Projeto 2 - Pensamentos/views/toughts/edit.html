<div class="tought-form-container">
    <a href="/toughts/dashboard">Voltar</a>
    <h1>Editando um Pensamento:</h1>
    <form action="/toughts/edit" method="POST">
        <input type="hidden" name="id" value="{{tought.id}}" />
        <div class="form-control">
            <label for="title">Pensamento:</label>
            <input type="text" name="title" value="{{tought.title}}" placeholder="Digite o seu pensamento" />
        </div>
        <input type="submit" value="Editar" />
    </form>
</div>
