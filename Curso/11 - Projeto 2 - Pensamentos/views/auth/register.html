<div class="auth-container">
    <h2>Registrar-se</h2>
    <form action="/register" method="POST">
        <div class="form-control">
            <label for="name">Nome:</label>
            <input type="text" name="name" placeholder="Digite o seu nome" required />
        </div>
        <div class="form-control">
            <label for="email">Email:</label>
            <input type="email" name="email" placeholder="Digite o seu email" required />
        </div>
        <div class="form-control">
            <label for="password">Senha:</label>
            <input type="password" name="password" placeholder="Digite a sua senha" required />
        </div>
        <div class="form-control">
            <label for="confirmpassword">Repita a senha:</label>
            <input type="password" name="confirmpassword" placeholder="Repita a sua senha" required />
        </div>
        <input type="submit" value="Cadastrar" />
        <p>
            <a href="/login">Entrar</a>
        </p>
    </form>
</div>
